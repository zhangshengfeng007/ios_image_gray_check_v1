name: Build macOS Executable

# Build on macOS runners for both arm64 and x86_64. Produce per-arch
# artifacts named `image_gray_check-macos-<arch>`.

on:
  push:
    paths:
      - 'image_gray_check.py'
      - 'build_image_gray_check_macos.sh'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Make build script executable
        run: chmod +x build_image_gray_check_macos.sh

      - name: Install UPX via Homebrew (for smaller binary)
        if: always()
        run: brew install upx || true

      - name: Run build script (console binary x86_64 via Rosetta)
        # Do not set WINDOWED: the default is 0 which produces a single
        # executable instead of an .app bundle.  ONEDIR is also left unset
        # so we keep --onefile packaging (smaller but slower startup).
        env:
          SMALLER: 1
        run: |
          arch -x86_64 ./build_image_gray_check_macos.sh
        shell: bash

      - name: Upload macOS binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: image_gray_check-macos
          path: dist-macos
