name: Build macOS Executable

# Build on macOS runners for both arm64 and x86_64. Produce per-arch
# artifacts named `image_gray_check-macos-<arch>`.

on:
  push:
    paths:
      - 'image_gray_check.py'
      - 'build_image_gray_check_macos.sh'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-latest

    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Make build script executable
        run: chmod +x build_image_gray_check_macos.sh

      - name: Run build script
        env:
          WINDOWED: 1
          ONEDIR: 1
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            arch -x86_64 ./build_image_gray_check_macos.sh
          else
            ./build_image_gray_check_macos.sh
          fi
        shell: bash

      - name: Upload macOS binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: image_gray_check-macos-${{ matrix.arch }}
          path: dist-macos
